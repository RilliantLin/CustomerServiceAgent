services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: customer_service_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customer_service_agent
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    platform: linux/amd64
    container_name: customer_service_agent_embeddings
    restart: unless-stopped
    command:
      [
        "--model-id",
        "BAAI/bge-m3",
        "--pooling",
        "mean",
        "--max-concurrent-requests",
        "32",
        "--max-batch-tokens",
        "512",
      ]
    ports:
      - "8080:80"
    volumes:
      - tei_data:/data

volumes:
  postgres_data:
  tei_data:
