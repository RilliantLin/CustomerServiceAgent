services:
  mysql:
    image: mysql:8.4
    container_name: customer_service_agent_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: customer_service_agent
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: customer_service_agent_embeddings
    restart: unless-stopped
    command: ["--model-id", "BAAI/bge-m3"]
    ports:
      - "8080:80"
    volumes:
      - tei_data:/data

volumes:
  mysql_data:
  tei_data:
